spec_version: 1
name: incidentops_env
type: space
runtime: fastapi
app: server.app:app
port: 8000 

tasks:
  - id: incident_easy
    name: "Single Service Outage (Easy)"
    description: "Diagnose and resolve a payment-service latency spike caused by a bad deployment."
    reset_kwargs:
      task_id: incident_easy
    grader:
      type: class
      module: graders
      class: IncidentEasyGrader

  - id: incident_medium
    name: "Dependency Failure (Medium)"
    reset_kwargs:
      task_id: incident_medium
    grader:
      type: class
      module: graders
      class: IncidentMediumGrader

  - id: incident_hard
    name: "Multi-Service Root Cause (Hard)"
    reset_kwargs:
      task_id: incident_hard
    grader:
      type: class
      module: graders
      class: IncidentHardGrader