spec_version: 1
name: incidentops_env
type: space
runtime: fastapi
app: server.app:app
port: 7860 

tasks:
  - id: incident_easy
    name: "Single Service Outage (Easy)"
    description: "Diagnose and resolve a payment-service latency spike caused by a bad deployment."
    reset_kwargs:
      difficulty: easy
    grader:
      type: class
      module: graders
      class: IncidentEasyGrader

  - id: incident_medium
    name: "Dependency Failure (Medium)"
    description: "Identify a DB timeout causing API gateway failures with no logs initially available."
    reset_kwargs:
      difficulty: medium
    grader:
      type: class
      module: graders
      class: IncidentMediumGrader

  - id: incident_hard
    name: "Multi-Service Root Cause (Hard)"
    description: "Trace EU checkout failures across auth, payment, checkout to a DNS issue."
    reset_kwargs:
      difficulty: hard
    grader:
      type: class
      module: graders
      class: IncidentHardGrader